<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Brush Buddy 3D — Kids Brushing Timer (Auto‑Frame)</title>
<style>
  :root{ --bg:#fffbe8; --card:#ffffff; --accent:#3aa2ff; --accent-2:#ffb86b; --text:#203040; --muted:#6b7890; }
  html,body{ height:100%; margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    background:linear-gradient(180deg,var(--bg),#fff); color:var(--text); }
  .app{ max-width:430px; margin:0 auto; padding:14px; box-sizing:border-box; }
  header{ display:flex; align-items:center; gap:12px; padding:8px 6px; }
  h1{ font-size:20px; margin:0; }
  .card{ background:var(--card); border-radius:14px; box-shadow:0 6px 18px rgba(20,30,50,.08); padding:12px; }
  .three-wrap{ width:100%; height:260px; border-radius:12px; overflow:hidden; background:#f2f6ff;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.04); }
  .status{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:10px; }
  .step-label{ font-weight:700; font-size:18px; }
  .countdown{ font-size:28px; font-weight:800; color:var(--accent); background:rgba(58,162,255,.08);
    padding:8px 12px; border-radius:12px; }
  .progress{ width:100%; height:10px; background:rgba(20,30,50,.06); border-radius:999px; overflow:hidden; margin-top:12px; }
  .progress > i{ display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .8s linear; }
  .controls{ display:flex; gap:10px; margin-top:12px; }
  button{ flex:1; padding:12px 10px; border-radius:12px; font-weight:700; border:0; background:linear-gradient(180deg,#f3f7ff,#e6f1ff); color:var(--text); box-shadow:0 6px 18px rgba(40,60,100,.06); font-size:16px; }
  button.primary{ background:linear-gradient(180deg,var(--accent),#1f99ff); color:#fff; }
  button.ghost{ background:transparent; border:2px solid rgba(40,60,100,.06); }
  .footer-note{ margin-top:10px; font-size:13px; color:var(--muted); text-align:center; }
  @media (max-width:380px){ .three-wrap{ height:230px; } }
  .micro{ font-size:12px; color:var(--muted); margin-top:6px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>Brush Buddy 3D</h1>
      <div style="font-size:13px;color:var(--muted)">Auto‑frames the model + Debug toggle</div>
    </div>
  </header>

  <div class="card">
    <div id="threeRoot" class="three-wrap" aria-label="3D teeth model"></div>

    <div class="status">
      <div>
        <div class="step-label" id="stepLabel">Ready</div>
        <div style="font-size:13px;color:var(--muted)" id="stepHint">Tap Start when ready</div>
        <div id="meta" class="micro"></div>
      </div>
      <div class="countdown" id="countdown">—</div>
    </div>

    <div class="progress"><i id="progFill"></i></div>

    <div class="controls" style="margin-top:12px;">
      <button id="backBtn" class="ghost">◀︎ Prev</button>
      <button id="startBtn" class="primary">Start</button>
      <button id="nextBtn" class="ghost">Next ▶︎</button>
    </div>

    <div style="display:flex;gap:8px;margin-top:10px;">
      <button id="pauseBtn" class="ghost" style="flex:1">Pause</button>
      <button id="resetBtn" class="ghost" style="flex:1">Reset</button>
      <button id="debugBtn" class="ghost" style="flex:1">Debug</button>
    </div>

    <div class="footer-note">
      Put this file and <b>teeth_mr.glb</b> in the same folder. Serve over HTTP (e.g., <code>python3 -m http.server</code>).
    </div>
  </div>
</div>

<script type="module">

/* Use esm.sh so all imports resolve in Safari/Chrome without import maps */
import * as THREE from "https://esm.sh/three@0.160.0";
import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

/* ------------ UI + Timer ------------ */
function buildSequenceFor(prefix){
  const P = prefix.toUpperCase();
  return [
    { key:`${prefix}-chew-right`, label:`${P} chewing — Right`, duration:15 },
    { key:`${prefix}-chew-left`,  label:`${P} chewing — Left`,  duration:15 },
    { key:`${prefix}-front`,      label:`${P} front`,           duration:10 },
    { key:`${prefix}-behind`,     label:`Behind ${P} front`,    duration:10 },
    { key:`${prefix}-in-left`,    label:`${P} inside — Left`,   duration:7  },
    { key:`${prefix}-out-left`,   label:`${P} outside — Left`,  duration:7  },
    { key:`${prefix}-in-right`,   label:`${P} inside — Right`,  duration:7  },
    { key:`${prefix}-out-right`,  label:`${P} outside — Right`, duration:7  },
  ];
}
const sequence = [...buildSequenceFor('u'), ...buildSequenceFor('l')];
const ui = {
  countdown: document.getElementById('countdown'),
  stepLabel: document.getElementById('stepLabel'),
  stepHint:  document.getElementById('stepHint'),
  progFill:  document.getElementById('progFill'),
  startBtn:  document.getElementById('startBtn'),
  pauseBtn:  document.getElementById('pauseBtn'),
  meta:      document.getElementById('meta'),
};
let state = { idx:0, secondsLeft: sequence[0].duration, running:false, ticker:null };
function formatTime(sec){ const m=Math.floor(sec/60), s=sec%60; return `${m}:${s<10?'0':''}${s}`; }
function beep(){ try{ const C=new (window.AudioContext||window.webkitAudioContext)(); const o=C.createOscillator(),g=C.createGain(); o.type='sine'; o.frequency.value=880; g.gain.value=0.02; o.connect(g); g.connect(C.destination); o.start(); setTimeout(()=>{o.stop();C.close();},120);}catch{} }

/* ------------ 3D Scene ------------ */
const container = document.getElementById('threeRoot');
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf3f7ff);

const camera = new THREE.PerspectiveCamera(36, container.clientWidth/container.clientHeight, 0.01, 100);
camera.position.set(0, 0.2, 2.0); // wide initial view

// Lights: brighter so white enamel stands out
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(1.2, 1.1, 1.5);
scene.add(dir);

// Root & helpers
const root = new THREE.Group();
scene.add(root);
let model=null, bboxHelper=null, bsphere=null, bcenter=new THREE.Vector3(), bradius=0;

// Load model
const loader = new GLTFLoader();
loader.load('./teeth_mr.glb',
  (gltf)=>{
    model = gltf.scene;

    // Ensure the model is visible regardless of material quirk
    model.traverse(n=>{
      if(n.isMesh){ n.frustumCulled = false; n.castShadow=false; n.receiveShadow=false; }
    });

    root.add(model);
    // Scale up 2×
    //model.scale.set(2,2,2);

    // Compute bounds robustly (include children)
    const box = new THREE.Box3().setFromObject(model);
    const size = new THREE.Vector3();
    const center = new THREE.Vector3();
    box.getSize(size);
    box.getCenter(center);

    // If size is degenerate, keep as-is; otherwise center
    const maxDim = Math.max(size.x,size.y,size.z);
    if(maxDim > 1e-6){
      model.position.sub(center); // center to origin
      // Recompute after centering
      box.setFromObject(model);
      box.getSize(size);
      box.getCenter(center);
    }

    // Bounding sphere for auto-framing
    bsphere = box.getBoundingSphere(new THREE.Sphere());
    bcenter.copy(bsphere.center);
    bradius = Math.max(bsphere.radius/1.5, 1e-3);

    // Add visible bbox helper
    bboxHelper = new THREE.Box3Helper(box, 0xffcc00);
    scene.add(bboxHelper);

    // Auto-frame camera from a pleasant angle
    fitCameraToSphere(camera, bcenter, bradius, 1.35, new THREE.Vector3(0.6, 0.35, 0.9));

    // Update UI with size
    ui.meta.textContent = `Model size: ${size.x.toFixed(3)} × ${size.y.toFixed(3)} × ${size.z.toFixed(3)} • radius ${bradius.toFixed(3)}`;

    // Start at first view
    setCameraToKey(sequence[0].key, true);

    renderStep();
  },
  undefined,
  (err)=>{
    ui.stepHint.textContent = 'Could not load teeth_mr.glb — is it in the same folder?';
    console.error(err);
  }
);

// Fit camera util
function fitCameraToSphere(cam, center, radius, zoom=1.2, dirHint=new THREE.Vector3(0,0,1)){
  const fov = cam.fov * Math.PI/180;
  const dist = (radius * zoom) / Math.sin(fov/2);
  const dir = dirHint.clone().normalize();
  cam.position.copy(center).addScaledVector(dir, dist);
  cam.near = Math.max(0.01, dist - radius*2);
  cam.far  = dist + radius*2 + 5;
  cam.updateProjectionMatrix();
  cam.lookAt(center);
}

// Views relative to bounding center, use auto distance
function viewPositionFromDir(dir){
  if(!bradius) return new THREE.Vector3(0,0,2); // fallback
  const fov = camera.fov * Math.PI/180;
  const dist = (bradius * 1.25) / Math.sin(fov/2);
  const d = dir.clone().normalize();
  return bcenter.clone().addScaledVector(d, dist);
}

const VIEWS = {
  'u-chew-right': new THREE.Vector3( 0.8,  0.5,  0.8),
  'u-chew-left' : new THREE.Vector3(-0.8,  0.5,  0.8),
  'u-front'     : new THREE.Vector3( 0.0,  0.4,  1.2),
  'u-behind'    : new THREE.Vector3( 0.0,  0.6, -0.9),
  'u-in-left'   : new THREE.Vector3(-0.8,  0.5, -0.2),
  'u-out-left'  : new THREE.Vector3(-0.8,  0.3,  0.6),
  'u-in-right'  : new THREE.Vector3( 0.8,  0.5, -0.2),
  'u-out-right' : new THREE.Vector3( 0.8,  0.3,  0.6),
  'l-chew-right': new THREE.Vector3( 0.8, -0.4,  0.8),
  'l-chew-left' : new THREE.Vector3(-0.8, -0.4,  0.8),
  'l-front'     : new THREE.Vector3( 0.0, -0.2,  1.2),
  'l-behind'    : new THREE.Vector3( 0.0, -0.4, -0.9),
  'l-in-left'   : new THREE.Vector3(-0.8, -0.3, -0.2),
  'l-out-left'  : new THREE.Vector3(-0.8, -0.3,  0.6),
  'l-in-right'  : new THREE.Vector3( 0.8, -0.3, -0.2),
  'l-out-right' : new THREE.Vector3( 0.8, -0.3,  0.6),
};

// Camera tween
let tweenStart = 0, tweenDur = 550;
const startPos = new THREE.Vector3(), endPos = new THREE.Vector3();
const curLook  = new THREE.Vector3(0,0,0);

function setCameraToKey(key, immediate=false){
  if(!bradius) return; // not ready
  const dir = VIEWS[key] ? VIEWS[key].clone() : new THREE.Vector3(0,0,1);
  const dst = viewPositionFromDir(dir);
  if(immediate){
    camera.position.copy(dst);
    curLook.copy(bcenter);
    camera.lookAt(curLook);
    return;
  }
  startPos.copy(camera.position);
  endPos.copy(dst);
  tweenStart = performance.now();
}
function updateTween(now){
  if(!endPos) return;
  const t = Math.min(1, (now - tweenStart)/tweenDur);
  const e = t<0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
  camera.position.lerpVectors(startPos, endPos, e);
  camera.lookAt(bcenter);
}

/* ------------ Render & Resize ------------ */
function onResize(){
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h,false);
}
window.addEventListener('resize', onResize);
renderer.setAnimationLoop((now)=>{ updateTween(now||performance.now()); renderer.render(scene, camera); });

/* ------------ Debug toggle ------------ */
let debugOn = false, savedMaterials = [];
function toggleDebug(){
  if(!model) return;
  debugOn = !debugOn;
  if(debugOn){
    savedMaterials = [];
    model.traverse(n=>{
      if(n.isMesh){
        savedMaterials.push([n, n.material]);
        n.material = new THREE.MeshNormalMaterial({ wireframe:false });
      }
    });
    ui.stepHint.textContent = 'Debug ON: showing normal colors';
  }else{
    savedMaterials.forEach(([mesh, mat])=> mesh.material = mat);
    savedMaterials = [];
    ui.stepHint.textContent = 'Debug OFF';
  }
}
document.getElementById('debugBtn').addEventListener('click', toggleDebug);

/* ------------ Timer wiring ------------ */
function renderStep(){
  if(state.idx >= sequence.length){
    ui.stepLabel.textContent = 'Done!'; ui.stepHint.textContent = 'All areas brushed — great job!';
    ui.countdown.textContent = '0:00'; ui.progFill.style.width = '100%';
    navigator.vibrate && navigator.vibrate([80,40,80]); return;
  }
  const s = sequence[state.idx];
  ui.stepLabel.textContent = `Step ${state.idx+1} — ${s.label}`;
  ui.stepHint.textContent  = `Brush this area for ${s.duration} seconds`;
  ui.countdown.textContent = formatTime(state.secondsLeft);
  ui.progFill.style.width = Math.round((state.idx / sequence.length) * 100) + '%';
  setCameraToKey(s.key, false);
  beep(); navigator.vibrate && navigator.vibrate(40);
}
function nextStep(){ if(state.idx < sequence.length) state.idx++; if(state.idx >= sequence.length){ stopTicker(); renderStep(); return; } state.secondsLeft = sequence[state.idx].duration; renderStep(); }
function prevStep(){ state.idx = Math.max(0, state.idx-1); state.secondsLeft = sequence[state.idx].duration; renderStep(); }
function startTicker(){
  if(state.running) return; state.running = true;
  ui.startBtn.textContent='Running...'; ui.startBtn.classList.remove('primary'); ui.startBtn.disabled = true;
  state.ticker = setInterval(()=>{ if(state.secondsLeft>0){ state.secondsLeft--; ui.countdown.textContent = formatTime(state.secondsLeft); } else { nextStep(); } }, 1000);
}
function stopTicker(){ state.running=false; clearInterval(state.ticker); state.ticker=null; ui.startBtn.textContent='Start'; ui.startBtn.classList.add('primary'); ui.startBtn.disabled=false; }
function pauseToggle(){ if(state.running){ clearInterval(state.ticker); state.ticker=null; state.running=false; ui.pauseBtn.textContent='Resume'; } else { startTicker(); ui.pauseBtn.textContent='Pause'; } }
function resetAll(){ stopTicker(); state.idx=0; state.secondsLeft = sequence[0].duration; renderStep(); ui.pauseBtn.textContent='Pause'; }

/* Buttons */
document.getElementById('startBtn').addEventListener('click', ()=>{
  if(state.idx >= sequence.length) resetAll();
  if(bradius){ setCameraToKey(sequence[state.idx].key, true); }
  startTicker(); beep(); navigator.vibrate && navigator.vibrate(80);
});
document.getElementById('nextBtn').addEventListener('click', nextStep);
document.getElementById('backBtn').addEventListener('click', prevStep);
document.getElementById('pauseBtn').addEventListener('click', pauseToggle);
document.getElementById('resetBtn').addEventListener('click', resetAll);

// Initialize
state.secondsLeft = sequence[0].duration; renderStep();
</script>
</body>
</html>
