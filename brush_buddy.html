<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Brush Buddy 3D — Kids Brushing Timer</title>
<link rel="stylesheet" href="brush_buddy.css" />
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>Brush Buddy 3D</h1>
      <div class="subhead">Drag/zoom to move the teeth • Debug shows coordinates</div>
    </div>
  </header>

  <div class="card">
    <div class="countdown" id="countdown">—</div>
    <div class="three-wrap" aria-label="3D teeth model">
      <div id="threeRoot"></div>
      <div class="step-overlay" id="stepNum">Step 1</div>
      <div id="hud" class="hud">
        <div><strong>Debug</strong> — camera & target</div>
        <pre id="hudText"></pre>
        <div class="row"><button id="copyBtn">Copy</button></div>
      </div>
      <div class="hint">Tip: pinch to zoom, drag to orbit</div>
    </div>

    <div class="status">
      <div class="step-label" id="stepLabel">Ready</div>
      <div class="step-hint" id="stepHint">Tap Start when ready</div>
    </div>

    <div class="progress"><i id="progFill"></i></div>

    <div class="controls">
      <button id="backBtn" class="ghost">◀︎ Prev</button>
      <button id="startBtn" class="primary">Start</button>
      <button id="nextBtn" class="ghost">Next ▶︎</button>
    </div>

    <div class="controls-secondary">
      <button id="pauseBtn" class="ghost">Pause</button>
      <button id="resetBtn" class="ghost">Reset</button>
      <button id="debugBtn" class="ghost">Debug</button>
    </div>

  </div>
</div>

<script type="module">
/* Use esm.sh so all imports resolve on iPhone without import maps */
import * as THREE from "https://esm.sh/three@0.160.0";
import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";

function toTitleCase(str) {
  return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
}

/* ------------ UI + Timer ------------ */
function buildSequenceFor(prefix){
  const P = toTitleCase(prefix);
  return [
    { key:`${prefix}-chew-right`, label:`${P} — Right`, duration:15 },
    { key:`${prefix}-chew-left`,  label:`${P} — Left`,  duration:15 },
    { key:`${prefix}-front`,      label:`${P} front`,           duration:10 },
    { key:`${prefix}-behind`,     label:`Behind front teeth`,    duration:10 },
    { key:`${prefix}-in-left`,    label:`${P} inside - outside`,   duration:7  },
    { key:`${prefix}-out-left`,   label:`${P} outside - inside`,  duration:7  },
    { key:`${prefix}-in-right`,   label:`${P} inside - outside`,  duration:7  },
    { key:`${prefix}-out-right`,  label:`${P} outside - inside`, duration:7  },
  ];
}
const sequence = [...buildSequenceFor('upper'), ...buildSequenceFor('lower')];
const ui = {
  countdown: document.getElementById('countdown'),
  stepLabel: document.getElementById('stepLabel'),
  stepHint:  document.getElementById('stepHint'),
  stepNum:   document.getElementById('stepNum'),
  progFill:  document.getElementById('progFill'),
  startBtn:  document.getElementById('startBtn'),
  pauseBtn:  document.getElementById('pauseBtn'),
  hud:       document.getElementById('hud'),
  hudText:   document.getElementById('hudText'),
  copyBtn:   document.getElementById('copyBtn'),
};
let state = { idx:0, secondsLeft: sequence[0].duration, running:false, ticker:null };
function formatTime(sec){ const m=Math.floor(sec/60), s=sec%60; return `${m}:${s<10?'0':''}${s}`; }
function beep(){ try{ const C=new (window.AudioContext||window.webkitAudioContext)(); const o=C.createOscillator(),g=C.createGain(); o.type='sine'; o.frequency.value=880; g.gain.value=0.02; o.connect(g); g.connect(C.destination); o.start(); setTimeout(()=>{o.stop();C.close();},120);}catch{} }

/* ------------ 3D Scene ------------ */
const container = document.getElementById('threeRoot');
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true, powerPreference:'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf3f7ff);

const camera = new THREE.PerspectiveCamera(36, container.clientWidth/container.clientHeight, 0.01, 200);
camera.position.set(0, 0.2, 2.0);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.65));
const dir = new THREE.DirectionalLight(0xffffff, 1.0);
dir.position.set(1.2, 1.1, 1.5);
scene.add(dir);

// Controls (moveable model)
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.rotateSpeed = 0.9;
controls.zoomSpeed = 0.6;
controls.panSpeed = 0.8;
//controls.target.set(0,0,0);

// Root
const root = new THREE.Group();
scene.add(root);
let model=null, bcenter=new THREE.Vector3(), bradius=0;

// Load model (converted metallic-roughness)
const loader = new GLTFLoader();
loader.load('./teeth_mr.glb',
  (gltf)=>{
    model = gltf.scene;

    // Ensure visible
    model.traverse(n=>{
      if(n.isMesh){ n.frustumCulled = false; n.castShadow=false; n.receiveShadow=false; }
    });

    root.add(model);

    // 🔸 Scale up 2× (per your request)
    // model.scale.multiplyScalar(2);

    // Center & bounds
    const box = new THREE.Box3().setFromObject(model);
    const size = new THREE.Vector3();
    const center = new THREE.Vector3();

    box.getSize(size);
    box.getCenter(center);

    if(Math.max(size.x,size.y,size.z) > 1e-6){
      model.position.sub(center);
      box.setFromObject(model);
    }
    const sphere = box.getBoundingSphere(new THREE.Sphere());
    bcenter.copy(sphere.center);
    bradius = Math.max(sphere.radius/1.5, 1e-3);


    // Auto-frame
    fitCameraToSphere(camera, bcenter, bradius, 1.35, new THREE.Vector3(0.6, 0.35, 0.9));
    controls.target.copy(bcenter);
    controls.update();

    // Start sequence
    setCameraToKey(sequence[0].key, true);
    renderStep();
    updateHud();
  },
  undefined,
  (err)=>{
    ui.stepHint.textContent = 'Could not load teeth_mr.glb — is it next to this file?';
    console.error(err);
  }
);

// Fit camera util
function fitCameraToSphere(cam, center, radius, zoom=1.2, dirHint=new THREE.Vector3(0,0,1)){
  const fov = cam.fov * Math.PI/180;
  const dist = (radius * zoom) / Math.sin(fov/2);
  const dir = dirHint.clone().normalize();
  cam.position.copy(center).addScaledVector(dir, dist);
  cam.near = Math.max(0.01, dist - radius*2);
  cam.far  = dist + radius*2 + 5;
  cam.updateProjectionMatrix();
  cam.lookAt(center);
}

// Views (directional) → converted to positions relative to model radius
function viewPositionFromDir(dir){
  if(!bradius) return new THREE.Vector3(0,0,2);
  const fov = camera.fov * Math.PI/180;
  const dist = (bradius * 1.25) / Math.sin(fov/2);
  const d = dir.clone().normalize();
  return bcenter.clone().addScaledVector(d, dist);
}
const VIEW_DIRS = {
  'upper-chew-right': new THREE.Vector3( 0.4,  -0.6,  1.2),
  // 'upper-chew-right': new THREE.Vector3( 0.8,  0.5,  0.8),
  'upper-chew-left' : new THREE.Vector3(-0.4,  -0.6,  1.2),
  // 'upper-chew-left' : new THREE.Vector3(-0.8,  0.5,  0.8),
  'upper-front'     : new THREE.Vector3( 0.0,  0.4,  1.2),
  'upper-behind'    : new THREE.Vector3( 0.0,  0.6, -1.9),
  'upper-in-left'   : new THREE.Vector3(-0.8,  0.5, -0.2),
  'upper-out-left'  : new THREE.Vector3(-0.8,  0.3,  0.6),
  'upper-in-right'  : new THREE.Vector3( 0.8,  0.5, -0.2),
  'upper-out-right' : new THREE.Vector3( 0.8,  0.3,  0.6),

  'lower-chew-right': new THREE.Vector3( 0.8, -0.4,  0.8),
  'lower-chew-left' : new THREE.Vector3(-0.8, -0.4,  0.8),
  'lower-front'     : new THREE.Vector3( 0.0, -0.2,  1.2),
  'lower-behind'    : new THREE.Vector3( 0.0, -0.4, -0.9),
  'lower-in-left'   : new THREE.Vector3(-0.8, -0.3, -0.2),
  'lower-out-left'  : new THREE.Vector3(-0.8, -0.3,  0.6),
  'lower-in-right'  : new THREE.Vector3( 0.8, -0.3, -0.2),
  'lower-out-right' : new THREE.Vector3( 0.8, -0.3,  0.6),
};

// Camera tween
let tweenStart = 0, tweenDur = 550;
const startPos = new THREE.Vector3(), endPos = new THREE.Vector3();

function setCameraToKey(key, immediate=false){
  if(!bradius) return;
  const dir = VIEW_DIRS[key] ? VIEW_DIRS[key].clone() : new THREE.Vector3(0,0,1);
  const dst = viewPositionFromDir(dir);
  controls.target.copy(bcenter); // keep target locked on teeth
  controls.update();
  if(immediate){
    camera.position.copy(dst);
    camera.lookAt(bcenter);
    controls.update();
    return;
  }
  startPos.copy(camera.position);
  endPos.copy(dst);
  tweenStart = performance.now();
}
function updateTween(now){
  const t = Math.min(1, (now - tweenStart)/tweenDur);
  const e = t<0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
  camera.position.lerpVectors(startPos, endPos, e);
  camera.lookAt(bcenter);
  controls.update();
}

/* ------------ Render & Resize ------------ */
function onResize(){
  const w = container.clientWidth, h = container.clientHeight;
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h,false);
}
window.addEventListener('resize', onResize);
renderer.setAnimationLoop((now)=>{ updateTween(now||performance.now()); renderer.render(scene, camera); });

/* ------------ Debug toggle & HUD ------------ */
let debugOn = false, savedMaterials = [];
function updateHud(){
  if(!debugOn) return;
  const pos = camera.position, tgt = controls.target;
  const dist = pos.distanceTo(tgt);
  const az = controls.getAzimuthalAngle?.() ?? 0; // radians
  const pol = controls.getPolarAngle?.() ?? 0;    // radians
  const to3 = (v)=>`${v.x.toFixed(3)}, ${v.y.toFixed(3)}, ${v.z.toFixed(3)}`;
  ui.hudText.textContent =
`pos:  (${to3(pos)})
tgt:  (${to3(tgt)})
dist: ${dist.toFixed(3)}
azim: ${az.toFixed(3)} rad (${(az*180/Math.PI).toFixed(1)}°)
polar:${pol.toFixed(3)} rad (${(pol*180/Math.PI).toFixed(1)}°)`;
}
function toggleDebug(){
  debugOn = !debugOn;
  ui.hud.style.display = debugOn ? 'block' : 'none';
  if(!model) return;
  if(debugOn){
    savedMaterials = [];
    model.traverse(n=>{
      if(n.isMesh){ savedMaterials.push([n, n.material]); n.material = new THREE.MeshNormalMaterial(); }
    });
    updateHud();
  }else{
    savedMaterials.forEach(([mesh, mat])=> mesh.material = mat);
    savedMaterials = [];
  }
}
document.getElementById('debugBtn').addEventListener('click', toggleDebug);
ui.copyBtn.addEventListener('click', async ()=>{
  try{ await navigator.clipboard.writeText(ui.hudText.textContent); ui.hudText.textContent += "\n(copied)"; setTimeout(updateHud, 1200);}catch{}
});
controls.addEventListener('change', updateHud);

/* ------------ Timer wiring ------------ */
const countdown = document.getElementById('countdown');
function renderStep(){
  if(state.idx >= sequence.length){
    ui.stepLabel.textContent = 'Done!'; ui.stepHint.textContent = 'All areas brushed — great job!';
    countdown.textContent = '0:00'; ui.progFill.style.width = '100%';
    navigator.vibrate && navigator.vibrate([80,40,80]); return;
  }
  const s = sequence[state.idx];
  ui.stepLabel.textContent = s.label;
  ui.stepNum.textContent   = `Step ${state.idx+1}`;
  ui.stepHint.textContent  = `Brush this area for ${s.duration} seconds`;
  countdown.textContent = formatTime(state.secondsLeft);
  ui.progFill.style.width = Math.round((state.idx / sequence.length) * 100) + '%';
  setCameraToKey(s.key, false);
  beep(); navigator.vibrate && navigator.vibrate(40);
}
function nextStep(){ if(state.idx < sequence.length) state.idx++; if(state.idx >= sequence.length){ stopTicker(); renderStep(); return; } state.secondsLeft = sequence[state.idx].duration; renderStep(); }
function prevStep(){ state.idx = Math.max(0, state.idx-1); state.secondsLeft = sequence[state.idx].duration; renderStep(); }
function startTicker(){
  if(state.running) return; state.running = true;
  ui.startBtn.textContent='Running...'; ui.startBtn.classList.remove('primary'); ui.startBtn.disabled = true;
  state.ticker = setInterval(()=>{ if(state.secondsLeft>0){ state.secondsLeft--; countdown.textContent = formatTime(state.secondsLeft); } else { nextStep(); } }, 1000);
}
function stopTicker(){ state.running=false; clearInterval(state.ticker); state.ticker=null; ui.startBtn.textContent='Start'; ui.startBtn.classList.add('primary'); ui.startBtn.disabled=false; }
function pauseToggle(){ if(state.running){ clearInterval(state.ticker); state.ticker=null; state.running=false; ui.pauseBtn.textContent='Resume'; } else { startTicker(); ui.pauseBtn.textContent='Pause'; } }
function resetAll(){ stopTicker(); state.idx=0; state.secondsLeft = sequence[0].duration; renderStep(); ui.pauseBtn.textContent='Pause'; }

/* Buttons */
document.getElementById('startBtn').addEventListener('click', ()=>{
  if(state.idx >= sequence.length) resetAll();
  if(bradius){ setCameraToKey(sequence[state.idx].key, true); }
  startTicker(); beep(); navigator.vibrate && navigator.vibrate(80);
});
document.getElementById('nextBtn').addEventListener('click', nextStep);
document.getElementById('backBtn').addEventListener('click', prevStep);
document.getElementById('pauseBtn').addEventListener('click', pauseToggle);
document.getElementById('resetBtn').addEventListener('click', resetAll);

// Initialize
state.secondsLeft = sequence[0].duration; renderStep();
</script>
</body>
</html>
